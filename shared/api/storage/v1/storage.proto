syntax = "proto3";

package opens3.storage.v1;

option go_package = "github.com/alesplll/opens3-rebac/shared/pkg/go/storage/v1;storagev1";

// DataStorageService — единственный сервис, хранящий байты на диске.
// Работает только с blob_id (UUID) и не знает о S3 API, бакетах, ключах или правах доступа.
// Вызывается только Gateway.
//
// Порт: 50053 (конфигурируется через GRPC_PORT)
//
// Структура хранилища на диске:
//   {DATA_DIR}/{shard}/{blob_id}                       — готовые объекты
//   {MULTIPART_DIR}/uploads/{upload_id}/               — multipart session + parts
//   {MULTIPART_DIR}/uploads/{blob_id}/                 — staging single-part upload
//   {MULTIPART_DIR}/completed/{shard}/{upload_id}.json — marker для идемпотентного CompleteMultipartUpload
//
// Kafka:
//   Потребляет ← object-deleted: получает blob_id → удаляет файл с диска (идемпотентно)
//   Публикует  → object-stored:  после успешного StoreObject (резервный путь для Metadata)
service DataStorageService {
  // StoreObject принимает поток байт и сохраняет их как blob на диск.
  // Client-streaming: первое сообщение должно быть header, все последующие — chunk.
  // Header содержит metadata и может также содержать первые байты файла.
  // Возвращает blob_id (UUID) и MD5 для последующей регистрации в Metadata.
  // Ошибки: RESOURCE_EXHAUSTED (недостаточно места), INTERNAL.
  rpc StoreObject(stream StoreObjectRequest) returns (StoreObjectResponse);

  // RetrieveObject читает blob с диска и стримит байты в Gateway.
  // Server-streaming: сервис отправляет файл чанками.
  // Поддерживает range-запросы (для HTTP Range-заголовка).
  // Ошибки: NOT_FOUND (blob_id не существует), INTERNAL.
  rpc RetrieveObject(RetrieveObjectRequest) returns (stream RetrieveObjectResponse);

  // DeleteObject удаляет blob с диска по blob_id.
  // Как правило, вызывается из Kafka-консьюмера при получении object-deleted, не напрямую.
  // Идемпотентен: удаление несуществующего blob_id — не ошибка, возвращает success=true.
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);

  // ─── Multipart Upload ─────────────────────────────────────────────────────

  // InitiateMultipartUpload открывает новую сессию составной загрузки.
  // Возвращает upload_id для последующих вызовов UploadPart.
  rpc InitiateMultipartUpload(InitiateMultipartUploadRequest) returns (InitiateMultipartUploadResponse);

  // UploadPart сохраняет одну часть multipart-загрузки.
  // Client-streaming: первое сообщение должно быть header, все последующие — chunk.
  // Header содержит upload_id/part_number и может также содержать первые байты части.
  // Части хранятся как {MULTIPART_DIR}/uploads/{upload_id}/part_{part_number}.
  // Ошибки: NOT_FOUND (upload_id не существует), INVALID_ARGUMENT (неверный part_number).
  rpc UploadPart(stream UploadPartRequest) returns (UploadPartResponse);

  // CompleteMultipartUpload склеивает все загруженные части в единый blob.
  // Возвращает итоговый blob_id и MD5 для регистрации в Metadata.
  // Удаляет временные файлы частей после склейки.
  // Ошибки: NOT_FOUND (upload_id не существует), INVALID_ARGUMENT (несовпадение чексумм).
  rpc CompleteMultipartUpload(CompleteMultipartUploadRequest) returns (CompleteMultipartUploadResponse);

  // AbortMultipartUpload отменяет multipart-загрузку и удаляет все временные части.
  // Идемпотентен: отмена несуществующего upload_id — не ошибка.
  rpc AbortMultipartUpload(AbortMultipartUploadRequest) returns (AbortMultipartUploadResponse);

  // HealthCheck — стандартный gRPC Health Checking Protocol.
  // Используется Kubernetes liveness/readiness probe и Gateway /ready.
  // NOT_SERVING возвращается если DATA_DIR недоступна или недостаточно места (RESOURCE_EXHAUSTED).
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ─── StoreObject ──────────────────────────────────────────────────────────────

message StoreObjectHeader {
  // Ожидаемый итоговый размер файла в байтах.
  // Optional позволяет различать "размер не передан" и "размер = 0".
  optional int64 size = 1;
  // MIME тип (напр. "image/jpeg", "application/octet-stream").
  string content_type = 2;
  // Первые байты файла, если клиент хочет начать загрузку уже в header.
  bytes data = 3;
}

message StoreObjectChunk {
  // Последующие байты файла после header.
  bytes data = 1;
}

// StoreObjectRequest — одно сообщение client-streaming запроса.
message StoreObjectRequest {
  oneof payload {
    StoreObjectHeader header = 1;
    StoreObjectChunk  chunk  = 2;
  }
}

message StoreObjectResponse {
  // UUID нового blob'а. Gateway передаёт его в Metadata CreateObjectVersion.
  string blob_id      = 1;
  // Hex-encoded MD5 сохранённого контента. Gateway использует его как ETag.
  string checksum_md5 = 2;
}

// ─── RetrieveObject ───────────────────────────────────────────────────────────

message RetrieveObjectRequest {
  // UUID blob'а, полученный из Metadata GetObjectMeta.
  string blob_id = 1;
  // Смещение от начала файла в байтах. 0 = читать с начала файла.
  int64  offset  = 2;
  // Сколько байт вернуть. 0 = читать до конца файла начиная с offset.
  int64  length  = 3;
}

// RetrieveObjectResponse — один чанк стримингового ответа.
message RetrieveObjectResponse {
  // Чанк байт файла.
  bytes data       = 1;
  // Полный размер blob'а в байтах. Передаётся только в первом сообщении потока.
  int64 total_size = 2;
}

// ─── DeleteObject ─────────────────────────────────────────────────────────────

message DeleteObjectRequest {
  // UUID blob'а для удаления.
  string blob_id = 1;
}

message DeleteObjectResponse {
  bool success = 1;
}

// ─── Multipart Upload ─────────────────────────────────────────────────────────

message InitiateMultipartUploadRequest {
  // Ожидаемое количество частей — подсказка для предварительного выделения (не обязательно).
  int32  expected_parts = 1;
  // MIME тип итогового объекта (напр. "video/mp4").
  string content_type   = 2;
}

message InitiateMultipartUploadResponse {
  // UUID сессии multipart-загрузки. Используется во всех последующих вызовах.
  string upload_id = 1;
}

message UploadPartHeader {
  // UUID сессии из InitiateMultipartUpload.
  string upload_id = 1;
  // Порядковый номер части (начиная с 1). Определяет порядок склейки в CompleteMultipartUpload.
  int32 part_number = 2;
  // Первые байты данной части, если клиент хочет начать загрузку уже в header.
  bytes data = 3;
}

message UploadPartChunk {
  // Последующие байты данной части после header.
  bytes data = 1;
}

// UploadPartRequest — одно сообщение client-streaming запроса части.
message UploadPartRequest {
  oneof payload {
    UploadPartHeader header = 1;
    UploadPartChunk  chunk  = 2;
  }
}

message UploadPartResponse {
  // MD5 данной части в hex. Передаётся в CompleteMultipartUpload для верификации целостности.
  string part_checksum_md5 = 1;
}

// PartInfo описывает одну часть при CompleteMultipartUpload.
message PartInfo {
  // Порядковый номер части (1-based), совпадает с part_number из UploadPart.
  int32  part_number  = 1;
  // MD5 части, полученный из UploadPartResponse. Используется для верификации.
  string checksum_md5 = 2;
}

message CompleteMultipartUploadRequest {
  // UUID сессии из InitiateMultipartUpload.
  string            upload_id = 1;
  // Все части в правильном порядке (по part_number).
  repeated PartInfo parts     = 2;
}

message CompleteMultipartUploadResponse {
  // UUID итогового собранного blob'а. Gateway передаёт его в Metadata CreateObjectVersion.
  string blob_id      = 1;
  // MD5 итогового собранного файла в hex. Gateway использует как ETag.
  string checksum_md5 = 2;
}

message AbortMultipartUploadRequest {
  // UUID сессии для отмены.
  string upload_id = 1;
}

message AbortMultipartUploadResponse {
  bool success = 1;
}

// ─── HealthCheck ──────────────────────────────────────────────────────────────

message HealthCheckRequest {
  // Имя сервиса. Пустая строка — проверить весь процесс.
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN     = 0; // Статус неизвестен
    SERVING     = 1; // Сервис готов
    NOT_SERVING = 2; // DATA_DIR недоступна или заканчивается место
  }
  ServingStatus status = 1;
}
