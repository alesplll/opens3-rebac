name: Test

on:
  push:
    branches: [main, 'test/**']
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, users, storage]
        include:
          - service: storage
            optional: true
    name: test (${{ matrix.service }})
    continue-on-error: ${{ matrix.optional || false }} # TODO: remove optional for storage once tests are stable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Run tests
        run: go test ./services/${{ matrix.service }}/... -count=1
