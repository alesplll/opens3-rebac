name: Test

on:
  push:
    branches: [main, 'test/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, users]
    name: test (${{ matrix.service }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Run tests
        run: go test ./services/${{ matrix.service }}/... -count=1
