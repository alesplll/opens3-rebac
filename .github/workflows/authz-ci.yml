name: AuthZ CI

on:
  push:
    branches: [main]
    paths:
      - "services/authz/**"
      - "shared/api/authz/**"
      - "shared/pkg/py/authz/**"
      - "Makefile"
  pull_request:
    paths:
      - "services/authz/**"
      - "shared/api/authz/**"
      - "shared/pkg/py/authz/**"
      - "Makefile"

defaults:
  run:
    working-directory: services/authz

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/authz/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run unit tests
        run: python -m pytest tests/unit -v --cov=internal --cov=entrypoints --cov-report=term-missing

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.21.0
        env:
          NEO4J_AUTH: neo4j/password123
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/authz/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run integration tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password123
        run: python -m pytest tests/integration -v -m integration
